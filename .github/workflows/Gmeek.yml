name: build Gmeek

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  schedule:
    - cron: "0 16 * * *"

jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-22.04  # 修正：降级到稳定兼容版本
    if: ${{ github.event.repository.owner.id == github.event.sender.id || github.event_name == 'schedule' }}
    permissions:
      contents: write  # 修正：最小权限原则
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Get config.json
        run: |
          echo "====== check config.json file ======"
          cat config.json  # 修正：拼写错误
          echo "====== check config.json end  ======"
          sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # 修正：升级到兼容版本

      - name: Clone source code
        run: |
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)
          git clone https://github.com/Meekdai/Gmeek.git /opt/Gmeek
          cd /opt/Gmeek
          lastTag=$(git describe --tags `git rev-list --tags --max-count=1`)
          if [ "$GMEEK_VERSION" = "last" ]; then  # 修正：标准bash字符串比较
            git checkout "$lastTag"
          else
            git checkout "$GMEEK_VERSION"
          fi

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt

      - name: Generate new html
        run: |
          # 处理手动触发时issue_number为空的情况
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_ARG="--issue_number ${{ github.event.issue.number }}"
          else
            ISSUE_ARG=""
          fi
          
          cp -r ./* /opt/Gmeek/
          cd /opt/Gmeek
          python Gmeek.py \
            ${{ secrets.GITHUB_TOKEN }} \
            ${{ github.repository }} \
            $ISSUE_ARG
          cp -a /opt/Gmeek/docs ${{ github.workspace }}
          cp -a /opt/Gmeek/backup ${{ github.workspace }}
          cp /opt/Gmeek/blogBase.json ${{ github.workspace }}

      - name: update html
        run: |
          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"
          git add .
          git commit -a -m 'auto update by Gmeek action' || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/.'

  deploy:
    name: Deploy blog
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
